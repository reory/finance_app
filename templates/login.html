{% extends "base.html" %}

{% block content %}
<div class="container" style="max-width: 420px; margin: 60px auto; padding: 20px;">

    <h2 style="text-align: center; margin-bottom: 25px;">
        Login to FinanceApp
    </h2>

    {% if messages %}
        <div style="margin-bottom: 15px;">
            {% for message in messages %}
                <div style="padding: 10px; background: #ffe6e6; border-left: 4px solid #cc0000; margin-bottom: 8px;">
                    {{ message }}
                </div>
            {% endfor %}
        </div>
    {% endif %}

    <form method="POST" style="display: flex; flex-direction: column; gap: 15px;">
        {% csrf_token %}

        <div>
            <label>Username</label>
            <input type="text" name="username" required
                   style="width: 100%; padding: 10px; border-radius: 6px; border: 1px solid #ccc;">
        </div>

        <div>
            <label>Password</label>
            <input type="password" name="password" required
                   style="width: 100%; padding: 10px; border-radius: 6px; border: 1px solid #ccc;">
        </div>

        <button type="submit"
                style="padding: 12px; background: #007bff; color: white; border: none; border-radius: 6px; cursor: pointer;">
            Login
        </button>
    </form>

    <p style="text-align: center; margin-top: 20px; color: #555;">
        Don't have an account?
        <a href="{% url 'register' %}" style="color: #007bff;">Register here</a>
    </p>

</div>
{% endblock %}
